      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add dist/*.svg
          git commit -m "chore: update neon butterfly svg" || exit 0

          # Pull latest changes before pushing (prevents 'fetch first' rejection)
          git pull --rebase origin main

          git push
